name: publish

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY_URL: registry.cn-hangzhou.aliyuncs.com
  REGISTRY_NAMESPACE: ptlzc
  IMAGE: registry.cn-hangzhou.aliyuncs.com/ptlzc/${{ github.event.repository.name }}

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify registry credentials
        run: |
          test -n "${{ secrets.REGISTRY_USERNAME }}"
          test -n "${{ secrets.REGISTRY_PASSWORD }}"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:latest
      - name: Publish summary
        run: |
          printf 'published_image=%s\n' "${IMAGE}:sha-${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
